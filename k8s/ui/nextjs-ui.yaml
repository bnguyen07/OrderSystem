apiVersion: apps/v1
kind: Deployment
metadata:
  name: ordersystem-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ordersystem-ui
  template:
    metadata:
      labels:
        app: ordersystem-ui
    spec:
      containers:
      - name: ordersystem-ui
        image: brian2447/ordersystem-ui:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        envFrom:
        - secretRef:
            name: nextjs-auth
---
apiVersion: v1
kind: Service
metadata:
  name: ordersystem-ui
spec:
  selector:
    app: ordersystem-ui
  ports:
  - port: 80
    targetPort: 3000
